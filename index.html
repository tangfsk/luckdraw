<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幸運抽獎</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
    }

    h1 {
      color: #ffd700;
      font-size: 2rem;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    }

    .wheel-container {
      position: relative;
      width: 360px;
      height: 360px;
    }

    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      position: relative;
      transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.3), inset 0 0 20px rgba(0,0,0,0.3);
      overflow: hidden;
      background: white;
    }

    /* 用Canvas畫扇形 */
    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    .center-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70px;
      height: 70px;
      background: linear-gradient(145deg, #ffd700, #ffaa00);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: bold;
      color: #1a1a2e;
      cursor: pointer;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
      z-index: 10;
    }

    .center-circle:hover {
      transform: translate(-50%, -50%) scale(1.05);
    }

    .pointer {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 35px solid #ff4444;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.4));
      z-index: 20;
    }

    .result {
      margin-top: 25px;
      padding: 15px 30px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: white;
      font-size: 1.3rem;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .result.show { opacity: 1; }

    .result.winning {
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.3), rgba(255, 165, 0, 0.3));
      border-color: rgba(255, 215, 0, 0.5);
    }
  </style>
</head>
<body>
  <h1>🎰 幸運大抽獎 🎰</h1>
  
  <div class="wheel-container">
    <div class="pointer"></div>
    <div class="wheel" id="wheel">
      <canvas id="canvas" width="360" height="360"></canvas>
    </div>
    <div class="center-circle" id="spinBtn">開始</div>
  </div>
  
  <div class="result" id="result"></div>

  <script>
    // 奖项从顶部顺时针: 
    const prizes = ['謝謝參與', '200 蚊', '100 蚊', '50 蚊', '20 蚊', '10 蚊'];
    const colors = ['#ff6b6b', '#4ecdc4', '#ffd93d', '#6bcb77', '#9b59b6', '#3498db'];
    
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const centerX = 180;
    const centerY = 180;
    const radius = 170;
    
    // 畫扇形同文字
    function drawWheel() {
      ctx.clearRect(0, 0, 360, 360);
      
      for (let i = 0; i < 6; i++) {
        const startAngle = (i * 60 - 90) * Math.PI / 180; // 從頂部開始
        const endAngle = ((i + 1) * 60 - 90) * Math.PI / 180;
        
        // 畫扇形
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = colors[i];
        ctx.fill();
        ctx.strokeStyle = '#1a1a2e';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // 畫文字
        const textAngle = startAngle + (endAngle - startAngle) / 2;
        const textRadius = radius * 0.65;
        const textX = centerX + textRadius * Math.cos(textAngle);
        const textY = centerY + textRadius * Math.sin(textAngle);
        
        ctx.save();
        ctx.translate(textX, textY);
        ctx.rotate(textAngle + Math.PI / 2); // 文字方向
        ctx.fillStyle = 'white';
        ctx.font = 'bold 16px Microsoft JhengHei';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 3;
        ctx.fillText(prizes[i], 0, 0);
        ctx.restore();
      }
    }
    
    drawWheel();
    
    const wheel = document.getElementById('wheel');
    const spinBtn = document.getElementById('spinBtn');
    const resultDiv = document.getElementById('result');
    
    let isSpinning = false;
    let currentRotation = 0;
    
    function spinWheel() {
      if (isSpinning) return;
      
      isSpinning = true;
      spinBtn.textContent = '轉緊...';
      resultDiv.classList.remove('show', 'winning');
      
      // 直接設一個目標角度 (0-359)
      const targetDegrees = Math.floor(Math.random() * 360);
      
      // 用目標角度計獎品
      const prizeIndex = Math.floor(targetDegrees / 60);
      
      // 計算最終旋轉: 4-6圈 + 目標角度
      const extraSpins = 4 + Math.floor(Math.random() * 3);
      const finalRotation = currentRotation + extraSpins * 360 + targetDegrees;
      
      console.log('targetDegrees:', targetDegrees, 'prizeIndex:', prizeIndex, 'prize:', prizes[prizeIndex]);
      
      wheel.style.transform = `rotate(${finalRotation}deg)`;
      currentRotation = finalRotation;
      
      setTimeout(() => {
        const prize = prizes[prizeIndex];
        resultDiv.textContent = prize === '謝謝參與' 
          ? '😢 ' + prize 
          : '🎉 你獲得 ' + prize + '!';
        resultDiv.classList.add('show');
        
        if (prize !== '謝謝參與') {
          resultDiv.classList.add('winning');
        }
        
        isSpinning = false;
        spinBtn.textContent = '再轉';
      }, 4000);
    }
    
    spinBtn.addEventListener('click', spinWheel);
    
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && !isSpinning) {
        e.preventDefault();
        spinWheel();
      }
    });
  </script>
</body>
</html>
