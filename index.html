<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幸運抽獎</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
    }

    h1 {
      color: #ffd700;
      font-size: 2rem;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    }

    .wheel-container {
      position: relative;
      width: 350px;
      height: 350px;
    }

    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      position: relative;
      transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
      overflow: hidden;
    }

    .wheel-bg {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      /* 0-60°:紅, 60-120°:青, 120-180°:黃, 180-240°:綠, 240-300°:紫, 300-360°:藍 */
      background: conic-gradient(
        #ff6b6b 0deg 60deg,
        #4ecdc4 60deg 120deg,
        #ffd93d 120deg 180deg,
        #6bcb77 180deg 240deg,
        #9b59b6 240deg 300deg,
        #3498db 300deg 360deg
      );
    }

    .wheel-text {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }

    .wheel-text span {
      position: absolute;
      left: 50%;
      top: 12%;
      transform: translateX(-50%);
      color: white;
      font-weight: bold;
      font-size: 1rem;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.6);
      white-space: nowrap;
    }

    .wheel-text span:nth-child(1) { transform: translateX(-50%) rotate(30deg); }
    .wheel-text span:nth-child(2) { transform: translateX(-50%) rotate(90deg); }
    .wheel-text span:nth-child(3) { transform: translateX(-50%) rotate(150deg); }
    .wheel-text span:nth-child(4) { transform: translateX(-50%) rotate(210deg); }
    .wheel-text span:nth-child(5) { transform: translateX(-50%) rotate(270deg); }
    .wheel-text span:nth-child(6) { transform: translateX(-50%) rotate(330deg); }

    .center-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70px;
      height: 70px;
      background: linear-gradient(145deg, #ffd700, #ffaa00);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: bold;
      color: #1a1a2e;
      cursor: pointer;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
      z-index: 10;
    }

    .pointer {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 35px solid #ff4444;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.4));
      z-index: 20;
    }

    .result {
      margin-top: 25px;
      padding: 15px 30px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: white;
      font-size: 1.3rem;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .result.show { opacity: 1; }

    .result.winning {
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.3), rgba(255, 165, 0, 0.3));
      border-color: rgba(255, 215, 0, 0.5);
    }
  </style>
</head>
<body>
  <h1>🎰 幸運大抽獎 🎰</h1>
  
  <div class="wheel-container">
    <div class="pointer"></div>
    <div class="wheel" id="wheel">
      <div class="wheel-bg"></div>
      <div class="wheel-text">
        <span>謝謝參與</span>
        <span>200 蚊</span>
        <span>100 蚊</span>
        <span>50 蚊</span>
        <span>20 蚊</span>
        <span>10 蚊</span>
      </div>
    </div>
    <div class="center-circle" id="spinBtn">開始</div>
  </div>
  
  <div class="result" id="result"></div>

  <script>
    // 奖项在转盘上的位置（顺时针从顶部0°开始）:
    // prizes[0] = 謝謝參與 在 0-60° (红色)
    // prizes[1] = 200蚊 在 60-120° (青色)
    // prizes[2] = 100蚊 在 120-180° (黄色)
    // prizes[3] = 50蚊 在 180-240° (绿色)
    // prizes[4] = 20蚊 在 240-300° (紫色)
    // prizes[5] = 10蚊 在 300-360° (蓝色)
    const prizes = ['謝謝參與', '200 蚊', '100 蚊', '50 蚊', '20 蚊', '10 蚊'];
    
    const wheel = document.getElementById('wheel');
    const spinBtn = document.getElementById('spinBtn');
    const resultDiv = document.getElementById('result');
    
    let isSpinning = false;
    let currentRotation = 0;
    
    function getRandomPrize() {
      return Math.floor(Math.random() * 6);
    }
    
    function spinWheel() {
      if (isSpinning) return;
      
      isSpinning = true;
      spinBtn.textContent = '轉緊...';
      resultDiv.classList.remove('show', 'winning');
      
      const prizeIndex = getRandomPrize();
      
      // 奖项i的起始角度是 i*60
      // 要让这个起始角度转到顶部(0°)，需要顺时针旋转: 360 - i*60
      // 例如: prizes[2]=100蚊 起始120°，需要旋转 360-120=240°
      const targetAngle = 360 - (prizeIndex * 60);
      
      const extraSpins = 4;
      const finalRotation = currentRotation + extraSpins * 360 + targetAngle;
      
      console.log('prizeIndex:', prizeIndex, 'prize:', prizes[prizeIndex], 'targetAngle:', targetAngle);
      
      wheel.style.transform = `rotate(${finalRotation}deg)`;
      currentRotation = finalRotation;
      
      setTimeout(() => {
        const prize = prizes[prizeIndex];
        resultDiv.textContent = prize === '謝謝參與' 
          ? '😢 ' + prize 
          : '🎉 你獲得 ' + prize + '!';
        resultDiv.classList.add('show');
        
        if (prize !== '謝謝參與') {
          resultDiv.classList.add('winning');
        }
        
        isSpinning = false;
        spinBtn.textContent = '再轉';
      }, 4000);
    }
    
    spinBtn.addEventListener('click', spinWheel);
    
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && !isSpinning) {
        e.preventDefault();
        spinWheel();
      }
    });
  </script>
</body>
</html>
