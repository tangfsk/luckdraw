<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幸運抽獎</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
    }

    h1 {
      color: #ffd700;
      font-size: 2rem;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    }

    .wheel-container {
      position: relative;
      width: 350px;
      height: 350px;
    }

    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      position: relative;
      transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
      overflow: hidden;
    }

    .segment {
      position: absolute;
      width: 50%;
      height: 50%;
      left: 50%;
      top: 0;
      transform-origin: 0% 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .segment::before {
      content: '';
      position: absolute;
      width: 0;
      height: 0;
      border-style: solid;
    }

    /* 每个扇形的样式 */
    .segment-0 { transform: rotate(0deg); background: #ff6b6b; clip-path: polygon(0 0, 100% 0, 100% 100%); }
    .segment-1 { transform: rotate(60deg); background: #4ecdc4; clip-path: polygon(0 0, 100% 0, 100% 100%); }
    .segment-2 { transform: rotate(120deg); background: #ffd93d; clip-path: polygon(0 0, 100% 0, 100% 100%); }
    .segment-3 { transform: rotate(180deg); background: #6bcb77; clip-path: polygon(0 0, 100% 0, 100% 100%); }
    .segment-4 { transform: rotate(240deg); background: #9b59b6; clip-path: polygon(0 0, 100% 0, 100% 100%); }
    .segment-5 { transform: rotate(300deg); background: #3498db; clip-path: polygon(0 0, 100% 0, 100% 100%); }

    .segment span {
      position: absolute;
      left: 35%;
      top: 30%;
      color: white;
      font-weight: bold;
      font-size: 1rem;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
      white-space: nowrap;
      transform: rotate(30deg);
    }

    .segment-0 span { transform: rotate(30deg); left: 40%; top: 25%; }
    .segment-1 span { transform: rotate(90deg); }
    .segment-2 span { transform: rotate(150deg); }
    .segment-3 span { transform: rotate(210deg); }
    .segment-4 span { transform: rotate(270deg); }
    .segment-5 span { transform: rotate(330deg); }

    .center-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70px;
      height: 70px;
      background: linear-gradient(145deg, #ffd700, #ffaa00);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: bold;
      color: #1a1a2e;
      cursor: pointer;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
      z-index: 10;
    }

    .center-circle:hover {
      transform: translate(-50%, -50%) scale(1.05);
    }

    .center-circle:active {
      transform: translate(-50%, -50%) scale(0.95);
    }

    .pointer {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 35px solid #ff4444;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.4));
      z-index: 20;
    }

    .result {
      margin-top: 25px;
      padding: 15px 30px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: white;
      font-size: 1.3rem;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .result.show {
      opacity: 1;
    }

    .result.winning {
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.3), rgba(255, 165, 0, 0.3));
      border-color: rgba(255, 215, 0, 0.5);
      animation: pulse 0.5s ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
  </style>
</head>
<body>
  <h1>🎰 幸運大抽獎 🎰</h1>
  
  <div class="wheel-container">
    <div class="pointer"></div>
    <div class="wheel" id="wheel">
      <!-- 顺时针从顶部开始: 謝謝參與, 200蚊, 100蚊, 50蚊, 20蚊, 10蚊 -->
      <div class="segment segment-0"><span>謝謝參與</span></div>
      <div class="segment segment-1"><span>200 蚊</span></div>
      <div class="segment segment-2"><span>100 蚊</span></div>
      <div class="segment segment-3"><span>50 蚊</span></div>
      <div class="segment segment-4"><span>20 蚊</span></div>
      <div class="segment segment-5"><span>10 蚊</span></div>
    </div>
    <div class="center-circle" id="spinBtn">開始</div>
  </div>
  
  <div class="result" id="result"></div>

  <script>
    // 奖项顺序：从顶部顺时针
    const prizes = ['謝謝參與', '200 蚊', '100 蚊', '50 蚊', '20 蚊', '10 蚊'];
    const segmentAngle = 360 / prizes.length;
    
    const wheel = document.getElementById('wheel');
    const spinBtn = document.getElementById('spinBtn');
    const resultDiv = document.getElementById('result');
    
    let isSpinning = false;
    let currentRotation = 0;
    
    function getRandomPrize() {
      const random = Math.random();
      if (random < 0.35) return 0;   // 35% 謝謝參與
      if (random < 0.5) return 1;      // 15% 200蚊
      if (random < 0.62) return 2;     // 12% 100蚊
      if (random < 0.72) return 3;     // 10% 50蚊
      if (random < 0.82) return 4;      // 10% 20蚊
      return 5;                        // 18% 10蚊
    }
    
    function spinWheel() {
      if (isSpinning) return;
      
      isSpinning = true;
      spinBtn.textContent = '轉緊...';
      resultDiv.classList.remove('show', 'winning');
      
      // 随机选择奖项
      const prizeIndex = getRandomPrize();
      
      // 顺时针旋转让目标奖项到达顶部
      // 如果奖项在索引i，需要旋转 360 - i*60 度
      const targetAngle = 360 - (prizeIndex * segmentAngle);
      
      // 额外旋转4-6圈
      const extraSpins = 4 + Math.floor(Math.random() * 3);
      const finalRotation = currentRotation + extraSpins * 360 + targetAngle;
      
      wheel.style.transform = `rotate(${finalRotation}deg)`;
      currentRotation = finalRotation;
      
      // 4秒后显示结果 - 使用预设的奖项
      setTimeout(() => {
        const prize = prizes[prizeIndex];
        resultDiv.textContent = prize === '謝謝參與' 
          ? '😢 ' + prize 
          : '🎉 你獲得 ' + prize + '!';
        resultDiv.classList.add('show');
        
        if (prize !== '謝謝參與') {
          resultDiv.classList.add('winning');
        }
        
        isSpinning = false;
        spinBtn.textContent = '再轉';
      }, 4000);
    }
    
    spinBtn.addEventListener('click', spinWheel);
    
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && !isSpinning) {
        e.preventDefault();
        spinWheel();
      }
    });
  </script>
</body>
</html>
