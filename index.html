<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幸運抽獎</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
    }

    h1 {
      color: #ffd700;
      font-size: 2rem;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    }

    .wheel-container {
      position: relative;
      width: 350px;
      height: 350px;
    }

    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      position: relative;
      transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
      overflow: hidden;
    }

    /* SVG扇形 */
    .wheel svg {
      width: 100%;
      height: 100%;
    }

    .segment {
      stroke: #1a1a2e;
      stroke-width: 2;
    }

    .segment-text {
      fill: white;
      font-weight: bold;
      font-size: 14px;
      text-anchor: middle;
      dominant-baseline: middle;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.6);
    }

    .center-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70px;
      height: 70px;
      background: linear-gradient(145deg, #ffd700, #ffaa00);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: bold;
      color: #1a1a2e;
      cursor: pointer;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
      z-index: 10;
    }

    .pointer {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 35px solid #ff4444;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.4));
      z-index: 20;
    }

    .result {
      margin-top: 25px;
      padding: 15px 30px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: white;
      font-size: 1.3rem;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .result.show { opacity: 1; }

    .result.winning {
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.3), rgba(255, 165, 0, 0.3));
      border-color: rgba(255, 215, 0, 0.5);
    }
  </style>
</head>
<body>
  <h1>🎰 幸運大抽獎 🎰</h1>
  
  <div class="wheel-container">
    <div class="pointer"></div>
    <div class="wheel" id="wheel">
      <svg viewBox="0 0 350 350">
        <!-- 扇形: 从0度顺时针 -->
        <!-- 0-60度: 謝謝參與 -->
        <path d="M175,175 L175,10 A165,165 0 0,1 317.88,92.5 Z" fill="#ff6b6b" class="segment"/>
        <text x="235" y="80" class="segment-text" transform="rotate(30, 235, 80)">謝謝參與</text>
        
        <!-- 60-120度: 200蚊 -->
        <path d="M317.88,92.5 L175,10 A165,165 0 0,1 317.88,257.5 Z" fill="#4ecdc4" class="segment"/>
        <text x="290" y="140" class="segment-text" transform="rotate(90, 290, 140)">200 蚊</text>
        
        <!-- 120-180度: 100蚊 -->
        <path d="M317.88,257.5 L175,340 A165,165 0 0,1 175,10 Z" fill="#ffd93d" class="segment"/>
        <text x="235" y="270" class="segment-text" transform="rotate(150, 235, 270)">100 蚊</text>
        
        <!-- 180-240度: 50蚊 -->
        <path d="M175,340 L32.12,257.5 A165,165 0 0,1 317.88,257.5 Z" fill="#6bcb77" class="segment"/>
        <text x="115" y="270" class="segment-text" transform="rotate(210, 115, 270)">50 蚊</text>
        
        <!-- 240-300度: 20蚊 -->
        <path d="M32.12,257.5 L32.12,92.5 A165,165 0 0,1 175,340 Z" fill="#9b59b6" class="segment"/>
        <text x="60" y="140" class="segment-text" transform="rotate(270, 60, 140)">20 蚊</text>
        
        <!-- 300-360度: 10蚊 -->
        <path d="M32.12,92.5 L175,10 A165,165 0 0,1 32.12,257.5 Z" fill="#3498db" class="segment"/>
        <text x="115" y="80" class="segment-text" transform="rotate(330, 115, 80)">10 蚊</text>
      </svg>
    </div>
    <div class="center-circle" id="spinBtn">開始</div>
  </div>
  
  <div class="result" id="result"></div>

  <script>
    // 奖项从顶部顺时针: 
    // index 0: 謝謝參與 (0-60°, 红色)
    // index 1: 200蚊 (60-120°, 青色)
    // index 2: 100蚊 (120-180°, 黄色)
    // index 3: 50蚊 (180-240°, 绿色)
    // index 4: 20蚊 (240-300°, 紫色)
    // index 5: 10蚊 (300-360°, 蓝色)
    const prizes = ['謝謝參與', '200 蚊', '100 蚊', '50 蚊', '20 蚊', '10 蚊'];
    
    const wheel = document.getElementById('wheel');
    const spinBtn = document.getElementById('spinBtn');
    const resultDiv = document.getElementById('result');
    
    let isSpinning = false;
    let currentRotation = 0;
    
    function getRandomPrize() {
      return Math.floor(Math.random() * 6);
    }
    
    function getPrizeFromRotation(rotation) {
      // 轉盤順時針轉R度，指針位置 = (360 - R) mod 360
      const normalized = rotation % 360;
      const pointerAngle = (360 - normalized) % 360;
      // 指針角度除60就係扇形index
      const segmentIndex = Math.floor(pointerAngle / 60) % 6;
      return segmentIndex;
    }
    
    function spinWheel() {
      if (isSpinning) return;
      
      isSpinning = true;
      spinBtn.textContent = '轉緊...';
      resultDiv.classList.remove('show', 'winning');
      
      // 随机生成最终旋转角度（4-6圈 + 随机角度）
      const extraSpins = 4 + Math.floor(Math.random() * 3);
      const randomOffset = Math.floor(Math.random() * 360);
      const finalRotation = currentRotation + extraSpins * 360 + randomOffset;
      
      // 從旋轉角度計算實際既獎品
      const prizeIndex = getPrizeFromRotation(finalRotation);
      
      console.log('finalRotation:', finalRotation, 'normalized:', finalRotation % 360, 'prizeIndex:', prizeIndex);
      
      wheel.style.transform = `rotate(${finalRotation}deg)`;
      currentRotation = finalRotation;
      
      setTimeout(() => {
        const prize = prizes[prizeIndex];
        resultDiv.textContent = prize === '謝謝參與' 
          ? '😢 ' + prize 
          : '🎉 你獲得 ' + prize + '!';
        resultDiv.classList.add('show');
        
        if (prize !== '謝謝參與') {
          resultDiv.classList.add('winning');
        }
        
        isSpinning = false;
        spinBtn.textContent = '再轉';
      }, 4000);
    }
    
    spinBtn.addEventListener('click', spinWheel);
    
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && !isSpinning) {
        e.preventDefault();
        spinWheel();
      }
    });
  </script>
</body>
</html>
