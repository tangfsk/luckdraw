<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幸運抽獎</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
      overflow: hidden;
    }

    h1 {
      color: #ffd700;
      font-size: 2.5rem;
      margin-bottom: 30px;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
      letter-spacing: 3px;
    }

    .wheel-container {
      position: relative;
      width: 380px;
      height: 380px;
    }

    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      position: relative;
      transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
      box-shadow: 
        0 0 30px rgba(255, 215, 0, 0.3),
        inset 0 0 50px rgba(0, 0, 0, 0.3);
    }

    .wheel-bg {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: conic-gradient(
        from -30deg,
        #ff6b6b 0deg 60deg,
        #4ecdc4 60deg 120deg,
        #ffd93d 120deg 180deg,
        #6bcb77 180deg 240deg,
        #9b59b6 240deg 300deg,
        #3498db 300deg 360deg
      );
      position: relative;
    }

    .wheel-text {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }

    .wheel-text span {
      position: absolute;
      left: 50%;
      top: 15%;
      transform: translateX(-50%) rotate(30deg);
      color: white;
      font-weight: bold;
      font-size: 1.1rem;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
      white-space: nowrap;
    }

    .wheel-text span:nth-child(1) { transform: translateX(-50%) rotate(30deg); }
    .wheel-text span:nth-child(2) { transform: translateX(-50%) rotate(90deg); }
    .wheel-text span:nth-child(3) { transform: translateX(-50%) rotate(150deg); }
    .wheel-text span:nth-child(4) { transform: translateX(-50%) rotate(210deg); }
    .wheel-text span:nth-child(5) { transform: translateX(-50%) rotate(270deg); }
    .wheel-text span:nth-child(6) { transform: translateX(-50%) rotate(330deg); }

    .center-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80px;
      height: 80px;
      background: linear-gradient(145deg, #ffd700, #ffaa00);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: bold;
      color: #1a1a2e;
      cursor: pointer;
      box-shadow: 
        0 5px 20px rgba(0, 0, 0, 0.4),
        inset 0 -3px 10px rgba(0, 0, 0, 0.2);
      transition: transform 0.2s, box-shadow 0.2s;
      z-index: 10;
    }

    .center-circle:hover {
      transform: translate(-50%, -50%) scale(1.05);
    }

    .center-circle:active {
      transform: translate(-50%, -50%) scale(0.95);
    }

    .pointer {
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-top: 40px solid #ff4444;
      filter: drop-shadow(0 3px 5px rgba(0, 0, 0, 0.4));
      z-index: 20;
    }

    .result {
      margin-top: 30px;
      padding: 20px 40px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      color: white;
      font-size: 1.5rem;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .result.show {
      opacity: 1;
    }

    .result.winning {
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.3), rgba(255, 165, 0, 0.3));
      border-color: rgba(255, 215, 0, 0.5);
    }
  </style>
</head>
<body>
  <h1>🎰 幸運大抽獎 🎰</h1>
  
  <div class="wheel-container">
    <div class="pointer"></div>
    <div class="wheel" id="wheel">
      <div class="wheel-bg">
        <div class="wheel-text">
          <span>謝謝參與</span>
          <span>10 蚊</span>
          <span>20 蚊</span>
          <span>50 蚊</span>
          <span>100 蚊</span>
          <span>200 蚊</span>
        </div>
      </div>
    </div>
    <div class="center-circle" id="spinBtn">開始</div>
  </div>
  
  <div class="result" id="result"></div>

  <script>
    // 奖项按顺时针排列：从顶部开始，逆时针读取
    // 索引0在顶部(0度)，索引1在60度位置...
    const prizes = ['謝謝參與', '200 蚊', '100 蚊', '50 蚊', '20 蚊', '10 蚊'];
    const segmentAngle = 360 / prizes.length;
    
    const wheel = document.getElementById('wheel');
    const spinBtn = document.getElementById('spinBtn');
    const resultDiv = document.getElementById('result');
    
    let isSpinning = false;
    let currentRotation = 0;
    
    function getRandomPrize() {
      const random = Math.random();
      if (random < 0.35) return 0;   // 35% 謝謝參與
      if (random < 0.5) return 1;   // 15% 200蚊
      if (random < 0.62) return 2;  // 12% 100蚊
      if (random < 0.72) return 3;   // 10% 50蚊
      if (random < 0.82) return 4;   // 10% 20蚊
      return 5;                      // 18% 10蚊
    }
    
    function spinWheel() {
      if (isSpinning) return;
      
      isSpinning = true;
      spinBtn.textContent = '轉緊...';
      resultDiv.classList.remove('show', 'winning');
      
      // 随机选择奖项
      const prizeIndex = getRandomPrize();
      
      // 计算旋转角度：让目标奖项转到顶部(0度)
      // 转盘顺时针转，所以要让索引prizeIndex转到顶部，需要逆时针转 prizeIndex * 60 度
      // 或者说顺时针转 360 - prizeIndex * 60 度
      const targetAngle = 360 - (prizeIndex * segmentAngle);
      
      // 额外旋转4-6圈
      const extraSpins = 4 + Math.floor(Math.random() * 3);
      const finalRotation = currentRotation + extraSpins * 360 + targetAngle;
      
      wheel.style.transform = `rotate(${finalRotation}deg)`;
      currentRotation = finalRotation;
      
      // 4秒后显示结果
      setTimeout(() => {
        const prize = prizes[prizeIndex];
        resultDiv.textContent = prize === '謝謝參與' 
          ? '😢 ' + prize 
          : '🎉 你獲得 ' + prize + '!';
        resultDiv.classList.add('show');
        
        if (prize !== '謝謝參與') {
          resultDiv.classList.add('winning');
        }
        
        isSpinning = false;
        spinBtn.textContent = '再轉';
      }, 4000);
    }
    
    spinBtn.addEventListener('click', spinWheel);
    
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && !isSpinning) {
        e.preventDefault();
        spinWheel();
      }
    });
  </script>
</body>
</html>
